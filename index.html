<!DOCTYPE html>
<html>
<head>
    <title>Open Multiple Tabs</title>
</head>
<body>

<script>
window.onload = function () {
    const url = "https://www.youtube.com"; // change this to your site
    const numberOfTabs = 2; // ← change this number to open more or fewer tabs

    for (let i = 0; i < numberOfTabs; i++) {
        window.open(url, "_blank");
    }
};
</script>

</body>
</html>
