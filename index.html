<!DOCTYPE html>
<html lang="en-US">
<head>
<base href="https://rawcdn.githack.com/genizy/google-class/main/gdlite/" />
<title>Geometry Dash</title>

<link rel="icon" type="image/png"
href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png"/>

<meta name="description"
content="Play Geometry Dash Lite Online For Free on Chromebook, PC, Windows, Desktop in Chrome and modern browsers."/>

<link rel="canonical"
href="https://gamecomets.com/game/geometry-dash-lite/"/>

<meta name="robots" content="noindex, nofollow"/>
<meta charset="utf-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="stylesheet"
href="themes/geometrydashlite.io/rs/css/home.css?v=1"/>

<style>

html{box-sizing:border-box;}
*,*:before,*:after{box-sizing:inherit;}

body{
margin:0;
background-image:linear-gradient(rgb(0,0,0),rgb(0,102,255));
overflow:hidden;
}

#gameContainer{
width:100vw;
height:100vh;
display:none;
}

canvas{
width:100%;
height:100%;
display:block;
}

canvas+*{z-index:2;}

.logo{
position:absolute;
display:block;
max-width:100vw;
max-height:70vh;
top:300px;
}

.pos_progress{
position:absolute;
bottom:15%;
width:100%;
}

.progress{
margin:1.5em auto;
max-width:436px;
display:none;
position:relative;
}

.full{
width:97%;
transform-origin:top left;
}

.box_process{width:100%;}

.progress .posfull,
.progress .posbox{
position:absolute;
display:flex;
align-items:center;
justify-content:center;
}

.progress .posfull{
top:8px;
z-index:1;
}

.progress .posbox{
top:0;
z-index:2;
}

#loader{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
background-image:linear-gradient(rgb(0,0,0),rgb(0,102,255));
}

.spinner,.spinner:after{
display:none;
border-radius:50%;
width:5em;
height:5em;
}

.spinner{
margin:10px;
font-size:10px;
position:relative;
text-indent:-9999em;
border-top:1.1em solid rgba(255,255,255,0.2);
border-right:1.1em solid rgba(255,255,255,0.2);
border-bottom:1.1em solid rgba(255,255,255,0.2);
border-left:1.1em solid #ffffff;
animation:spinner-spin 1.1s infinite linear;
}

@keyframes spinner-spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* LOGIN SCREEN */

#codeScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
font-family:sans-serif;
z-index:9999;
}

#codeScreen input{
padding:10px;
font-size:18px;
border-radius:6px;
border:none;
}

#codeScreen button{
margin-top:10px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- CODE SCREEN -->

<div id="codeScreen">

<h1>Enter the password</h1>

<input id="codeInput" placeholder="password">

<button onclick="checkCode()">Play</button>

<p id="error" style="color:red"></p>

</div>

<div id="gameContainer"></div>

<div id="loader">
<img class="logo" src="image/loading.png?v=1"/>
<div class="spinner"></div>

<div class="pos_progress">
<div class="progress">

<div class="posfull">
<img class="full" src="image/process_bar_back.png"/>
</div>

<div class="posbox">
<img class="box_process" src="image/process_bar_front.png"/>
</div>

</div>
</div>
</div>

<script src="Build/UnityLoader.js"></script>

<script>

var gameInstance;

/* START GAME AFTER CODE */

function startGame(){

document.getElementById("gameContainer").style.display="block";
document.getElementById("loader").style.display="flex";

gameInstance = UnityLoader.instantiate(
"gameContainer",
"Build/GeometryDashLite.json",
{ onProgress: UnityProgress }
);

}

/* CODE CHECK */

function checkCode(){

let code=document.getElementById("codeInput").value;

if(code==="TRO"){

document.getElementById("codeScreen").style.display="none";

startGame();

}else{

document.getElementById("error").innerText="password incorrect";

}

}

/* UNITY LOADER */

function UnityProgress(gameInstance,progress){

if(!gameInstance.Module)return;

const loader=document.querySelector("#loader");

if(!gameInstance.progress){

const progressEl=document.querySelector("#loader .progress");

progressEl.style.display="block";

gameInstance.progress=progressEl.querySelector(".full");

loader.querySelector(".spinner").style.display="none";

}

gameInstance.progress.style.transform=`scaleX(${progress})`;

if(progress===1&&!gameInstance.removeTimeout){

gameInstance.removeTimeout=setTimeout(()=>loader.style.display="none",2000);

}

}

/* JUMP CONTROLS */

document.addEventListener("keydown",function(e){

if(e.code==="Space"||e.code==="ArrowUp"){

e.preventDefault();

const canvas=document.querySelector("#gameContainer canvas");

if(canvas){

const rect=canvas.getBoundingClientRect();

const clickEvent=new MouseEvent("mousedown",{
bubbles:true,
cancelable:true,
clientX:rect.left+rect.width/2,
clientY:rect.top+rect.height/2
});

canvas.dispatchEvent(clickEvent);

const upEvent=new MouseEvent("mouseup",{
bubbles:true,
cancelable:true,
clientX:rect.left+rect.width/2,
clientY:rect.top+rect.height/2
});

setTimeout(()=>canvas.dispatchEvent(upEvent),50);

}

}

});

</script>

<script src="themes/geometrydashlite.io/rs/js/jquery-3.4.1.min.js"></script>

</body>
</html>
